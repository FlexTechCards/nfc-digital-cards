<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FlexTech Card</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>
/* ——— نفس التنسيق الذي أرسلته ——— */
(ضع هنا نفس CSS الذي لديك بدون أي تعديل)
</style>

</head>

<body>

<div class="card">

<div class="header">

<div class="profile-area">

<img id="profileImage" class="profile">

<div class="info">

<div id="name" class="name"></div>
<div id="role" class="role"></div>
<div class="line"></div>
<div id="company" class="company"></div>

</div>

</div>

</div>

<div class="content">

<div id="bio" class="bio"></div>

<div id="landlineBox"
class="bio"
style="font-size:15px;margin-top:-10px;margin-bottom:25px;color:#64748b;">
</div>

<a id="phoneLink" class="contact-box">
<div class="contact-left">
<div class="icon"><i class="fas fa-phone"></i></div>
<div class="contact-text">
<div class="label">Mobile</div>
<div id="phone" class="value"></div>
</div>
</div>
<div class="arrow">›</div>
</a>

<a id="emailLink" class="contact-box">
<div class="contact-left">
<div class="icon"><i class="fas fa-envelope"></i></div>
<div class="contact-text">
<div class="label">Email</div>
<div id="email" class="value"></div>
</div>
</div>
<div class="arrow">›</div>
</a>

<div id="socials" class="socials"></div>

<div class="actions">
<button class="btn primary" onclick="saveContact()">
<i class="fas fa-user-plus"></i> Add To Contacts
</button>

<button class="btn secondary" onclick="shareCard()">
<i class="fas fa-share-alt"></i> Share Card
</button>
</div>

<div class="footer">
<div class="created">powered by</div>
<a href="https://instagram.com/flex.tech1" target="_blank">
<img src="https://i.imgur.com/LmWt6sc.png">
</a>
</div>

</div>

</div>

<script type="module">

import { initializeApp } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { 
getFirestore, 
doc, 
getDoc 
} 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE CONFIG */
const firebaseConfig = {
apiKey: "AIzaSyD5XXOXRaVgXvkuwZ0hParJ-iipkA9uGKo",
authDomain: "flextech-2324d.firebaseapp.com",
projectId: "flextech-2324d",
storageBucket: "flextech-2324d.firebasestorage.app",
messagingSenderId: "511190640221",
appId: "1:511190640221:web:20701272956f01e22c0fb4"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* GET CLIENT ID FROM URL */
const params = new URLSearchParams(window.location.search);
const clientId = params.get("id");

/* LOAD CLIENT DIRECTLY BY DOCUMENT ID */
async function loadClient() {

const ref = doc(db, "clients", clientId);
const snap = await getDoc(ref);

if (!snap.exists()) {
document.body.innerHTML = "<h2 style='color:white;text-align:center;margin-top:40px;'>Client Not Found</h2>";
return;
}

const client = snap.data();

/* FILL DATA */
document.getElementById("name").innerHTML = client.name || "";
document.getElementById("role").innerHTML = client.role || "";
document.getElementById("company").innerHTML = client.company || "";
document.getElementById("bio").innerHTML = client.bio || "";

document.getElementById("landlineBox").innerHTML =
client.landline
? `Landline: ${client.landline}${client.extension ? " | EXT: " + client.extension : ""}`
: "";

document.getElementById("phone").innerHTML = client.phone || "";
document.getElementById("email").innerHTML = client.email || "";
document.getElementById("profileImage").src = client.image || "";

document.getElementById("phoneLink").href = `tel:${client.phone}`;
document.getElementById("emailLink").href = `mailto:${client.email}`;

/* SOCIALS */
let socialsHTML = "";
const icons = {
instagram: "fab fa-instagram",
whatsapp: "fab fa-whatsapp",
linkedin: "fab fa-linkedin-in",
facebook: "fab fa-facebook-f",
telegram: "fab fa-telegram-plane",
tiktok: "fab fa-tiktok"
};

if (client.socials) {
for (let social in client.socials) {
if (client.socials[social]) {
socialsHTML += `
<a class="social ${social}" href="${client.socials[social]}" target="_blank">
<i class="${icons[social]}"></i>
</a>
`;
}
}
}

document.getElementById("socials").innerHTML = socialsHTML;

}

loadClient();

/* SHARE */
window.shareCard = function () {
if (navigator.share) {
navigator.share({
title: "FlexTech Digital Card",
text: "Check my digital business card",
url: window.location.href
});
}
};

/* SAVE CONTACT */
window.saveContact = function () {

const name = document.getElementById("name").innerText;
const phone = document.getElementById("phone").innerText;
const email = document.getElementById("email").innerText;

const vcf = `
BEGIN:VCARD
VERSION:3.0
FN:${name}
TEL:${phone}
EMAIL:${email}
END:VCARD
`;

const blob = new Blob([vcf], { type: 'text/vcard' });
const link = document.createElement('a');
link.href = URL.createObjectURL(blob);
link.download = `${name}.vcf`;
link.click();

};

</script>

</body>
</html>
