<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FlexTech Dashboard</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:system-ui,-apple-system,Segoe UI,Roboto;

background:
linear-gradient(135deg,#020617,#07245f);

min-height:100vh;

padding:30px 16px;

color:white;
}

.title{

text-align:center;

font-size:38px;

font-weight:800;

margin-bottom:10px;
}

.subtitle{

text-align:center;

color:#cbd5e1;

margin-bottom:30px;
}

.btn{

width:100%;

margin-top:18px;

padding:18px;

border:none;

border-radius:18px;

background:
linear-gradient(145deg,#06b6d4,#2563eb);

color:white;

font-size:17px;
font-weight:800;

cursor:pointer;

transition:.25s;
}

.btn:hover{
transform:scale(1.02);
}

.form{

max-width:700px;

margin:auto;

background:rgba(255,255,255,.06);

backdrop-filter:blur(12px);

padding:24px;

border-radius:30px;

border:1px solid rgba(255,255,255,.08);

margin-bottom:30px;
}

.grid{

display:grid;

grid-template-columns:1fr 1fr;

gap:14px;
}

@media(max-width:700px){

.grid{
grid-template-columns:1fr;
}

}

.input{

width:100%;

padding:16px;

border:none;

border-radius:16px;

background:rgba(255,255,255,.1);

color:white;

font-size:15px;

outline:none;
}

.input::placeholder{
color:#cbd5e1;
}

.clients{

max-width:1100px;

margin:auto;

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(300px,1fr));

gap:20px;
}

.client-card{

background:white;

border-radius:26px;

overflow:hidden;

color:#0f172a;

box-shadow:
0 20px 50px rgba(0,0,0,.3);
}

.top{

background:
linear-gradient(rgba(2,20,47,.88),
rgba(2,20,47,.92)),
url("https://images.unsplash.com/photo-1557683316-973673baf926?q=80&w=1200");

background-size:cover;

padding:20px;

display:flex;
align-items:center;

gap:14px;
}

.top img{

width:90px;
height:90px;

border-radius:50%;

object-fit:cover;

border:4px solid white;
}

.info h2{

color:white;

font-size:24px;

margin-bottom:6px;
}

.info p{

color:#cbd5e1;
}

.content{
padding:18px;
}

.email{

word-break:break-word;
overflow-wrap:anywhere;
}

.actions{

display:flex;
flex-wrap:wrap;

gap:10px;

margin-top:16px;
}

.action-btn{

flex:1;

min-width:120px;

text-align:center;

padding:14px;

border:none;

border-radius:14px;

text-decoration:none;

font-weight:700;

cursor:pointer;

transition:.25s;
}

.view{

background:#07245f;

color:white;
}

.qr{

background:#06b6d4;

color:white;
}

.delete{

background:#ef4444;

color:white;
}

.action-btn:hover{
transform:translateY(-2px);
}

</style>

</head>

<body>

<h1 class="title">
FlexTech Dashboard
</h1>

<p class="subtitle">
Firebase SaaS System
</p>

<button class="btn"
style="
max-width:220px;
margin:0 auto 30px;
display:block;
"
onclick="logout()">

Logout

</button>

<div class="form">

<div class="grid">

<input class="input"
id="id"
placeholder="Client ID">

<input class="input"
id="name"
placeholder="Full Name">

<input class="input"
id="role"
placeholder="Job Title">

<input class="input"
id="company"
placeholder="Company">

<textarea class="input"
id="bio"
placeholder="Bio"
style="min-height:120px"></textarea>

<input class="input"
id="phone"
placeholder="Mobile Phone">

<input class="input"
id="landline"
placeholder="Landline Phone">

<input class="input"
id="extension"
placeholder="Extension">

<input class="input"
id="email"
placeholder="Email">

<input class="input"
id="image"
placeholder="Profile Image URL">

<input class="input"
id="instagram"
placeholder="Instagram Link">

<input class="input"
id="whatsapp"
placeholder="WhatsApp Link">

</div>

<button class="btn"
onclick="addClient()">

<i class="fas fa-plus"></i>
Save Client

</button>

</div>

<div class="clients"
id="clientsList"></div>

<script type="module">

import {
initializeApp
}
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getFirestore,
collection,
addDoc,
getDocs,
doc,
deleteDoc,
updateDoc

}
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {

getAuth,
onAuthStateChanged,
signOut

}
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {

apiKey: "AIzaSyD5XXOXRaVgXvkuwZ0hParJ-iipkA9uGKo",

authDomain: "flextech-2324d.firebaseapp.com",

projectId: "flextech-2324d",

storageBucket: "flextech-2324d.firebasestorage.app",

messagingSenderId: "511190640221",

appId: "1:511190640221:web:20701272956f01e22c0fb4"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

const auth =
getAuth(app);

let editingDocId = null;

onAuthStateChanged(auth,(user)=>{

if(!user){

window.location.href =
"login.html";

}

});

window.logout =
async function(){

await signOut(auth);

window.location.href =
"login.html";

};

window.addClient =
async function(){

const cleanId =
document.getElementById("id")
.value
.trim()
.toLowerCase()
.replace(/\s+/g,"-");

if(!cleanId){

alert("Client ID Required");

return;

}

const client = {

id: cleanId,

name:
document.getElementById("name").value,

role:
document.getElementById("role").value,

company:
document.getElementById("company").value,

bio:
document.getElementById("bio").value,

phone:
document.getElementById("phone").value,

landline:
document.getElementById("landline").value,

extension:
document.getElementById("extension").value,

email:
document.getElementById("email").value,

image:
document.getElementById("image").value,

socials:{

instagram:
document.getElementById("instagram").value,

whatsapp:
document.getElementById("whatsapp").value

}

};

if(editingDocId){

await updateDoc(
doc(db,"clients",editingDocId),
client
);

alert("Client Updated ✅");

editingDocId = null;

}else{

await addDoc(
collection(db,"clients"),
client
);

alert("Client Added 🔥");

}

document.querySelectorAll(".input").forEach(input=>{

input.value = "";

});

loadClients();

};

async function loadClients(){

const querySnapshot =
await getDocs(collection(db,"clients"));

let html = "";

querySnapshot.forEach((documentItem)=>{

const client = documentItem.data();

const link =
`template.html?id=${encodeURIComponent(client.id)}`;

const qr =
`https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${window.location.origin}/${link}`;

html += `

<div class="client-card">

<div class="top">

<img src="${client.image || ""}">

<div class="info">

<h2>
${client.name || ""}
</h2>

<p>
${client.role || ""}
</p>

</div>

</div>

<div class="content">

<p class="email">
${client.email || ""}
</p>

<div class="actions">

<a class="action-btn view"
target="_blank"
href="${link}">

View

</a>

<a class="action-btn qr"
target="_blank"
href="${qr}">

QR

</a>

<button class="action-btn view"
onclick='editClient(
${JSON.stringify(documentItem.id)},
${JSON.stringify(client.id || "")},
${JSON.stringify(client.name || "")},
${JSON.stringify(client.role || "")},
${JSON.stringify(client.company || "")},
${JSON.stringify(client.bio || "")},
${JSON.stringify(client.phone || "")},
${JSON.stringify(client.landline || "")},
${JSON.stringify(client.extension || "")},
${JSON.stringify(client.email || "")},
${JSON.stringify(client.image || "")},
${JSON.stringify(client.socials?.instagram || "")},
${JSON.stringify(client.socials?.whatsapp || "")}
)'>

Edit

</button>

<button class="action-btn delete"
onclick="deleteClient('${documentItem.id}')">

Delete

</button>

</div>

</div>

</div>

`;

});

document.getElementById("clientsList").innerHTML =
html;

}

window.editClient = function(

docId,
id,
name,
role,
company,
bio,
phone,
landline,
extension,
email,
image,
instagram,
whatsapp

){

editingDocId = docId;

document.getElementById("id").value = id || "";
document.getElementById("name").value = name || "";
document.getElementById("role").value = role || "";
document.getElementById("company").value = company || "";
document.getElementById("bio").value = bio || "";
document.getElementById("phone").value = phone || "";
document.getElementById("landline").value = landline || "";
document.getElementById("extension").value = extension || "";
document.getElementById("email").value = email || "";
document.getElementById("image").value = image || "";
document.getElementById("instagram").value = instagram || "";
document.getElementById("whatsapp").value = whatsapp || "";

window.scrollTo({
top:0,
behavior:"smooth"
});

};

window.deleteClient =
async function(docId){

const confirmDelete =
confirm("Delete this client?");

if(confirmDelete){

await deleteDoc(
doc(db,"clients",docId)
);

loadClients();

}

};

loadClients();

</script>

</body>
</html>
