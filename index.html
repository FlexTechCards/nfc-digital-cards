<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FlexTech Dashboard</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:system-ui,-apple-system,Segoe UI,Roboto;

    background:
    linear-gradient(135deg,#020617,#07245f);

    min-height:100vh;

    padding:30px 16px;

    color:white;
}

/* TITLE */

.title{

    text-align:center;

    font-size:38px;

    font-weight:800;

    margin-bottom:10px;
}

.subtitle{

    text-align:center;

    color:#cbd5e1;

    margin-bottom:30px;
}

/* FORM */

.form{

    max-width:700px;

    margin:auto;

    background:rgba(255,255,255,.06);

    backdrop-filter:blur(12px);

    padding:24px;

    border-radius:30px;

    border:1px solid rgba(255,255,255,.08);

    margin-bottom:30px;
}

/* GRID */

.grid{

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:14px;
}

@media(max-width:700px){

    .grid{
        grid-template-columns:1fr;
    }

}

/* INPUT */

.input{

    width:100%;

    padding:16px;

    border:none;

    border-radius:16px;

    background:rgba(255,255,255,.1);

    color:white;

    font-size:15px;

    outline:none;
}

.input::placeholder{
    color:#cbd5e1;
}

/* BUTTON */

.btn{

    width:100%;

    margin-top:18px;

    padding:18px;

    border:none;

    border-radius:18px;

    background:
    linear-gradient(145deg,#06b6d4,#2563eb);

    color:white;

    font-size:17px;
    font-weight:800;

    cursor:pointer;

    transition:.25s;
}

.btn:hover{
    transform:scale(1.02);
}

/* CLIENTS */

.clients{

    max-width:1100px;

    margin:auto;

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(300px,1fr));

    gap:20px;
}

/* CARD */

.client-card{

    background:white;

    border-radius:26px;

    overflow:hidden;

    color:#0f172a;

    box-shadow:
    0 20px 50px rgba(0,0,0,.3);
}

/* TOP */

.top{

    background:
    linear-gradient(rgba(2,20,47,.88),
    rgba(2,20,47,.92)),
    url("https://images.unsplash.com/photo-1557683316-973673baf926?q=80&w=1200");

    background-size:cover;

    padding:20px;

    display:flex;
    align-items:center;

    gap:14px;
}

/* IMAGE */

.top img{

    width:90px;
    height:90px;

    border-radius:50%;

    object-fit:cover;

    border:4px solid white;
}

/* INFO */

.info h2{

    color:white;

    font-size:24px;

    margin-bottom:6px;
}

.info p{

    color:#cbd5e1;
}

/* CONTENT */

.content{
    padding:18px;
}

/* ACTIONS */

.actions{

    display:flex;

    gap:10px;

    margin-top:16px;
}

/* ACTION BUTTON */

.action-btn{

    flex:1;

    text-align:center;

    padding:14px;

    border-radius:14px;

    text-decoration:none;

    font-weight:700;

    transition:.25s;
}

.view{

    background:#07245f;

    color:white;
}

.qr{

    background:#06b6d4;

    color:white;
}

.action-btn:hover{
    transform:translateY(-2px);
}

</style>

</head>

<body>

<h1 class="title">
    FlexTech Dashboard
</h1>

<p class="subtitle">
    Firebase SaaS System
</p>

<!-- FORM -->

<div class="form">

<div class="grid">

<input class="input"
id="id"
placeholder="Client ID">

<input class="input"
id="name"
placeholder="Full Name">

<input type="text"
id="company"
placeholder="Company">

<input class="input"
id="role"
placeholder="Job Title">

<input class="input"
id="company"
placeholder="Company">

<textarea class="input"
id="bio"
placeholder="Bio"
style="min-height:120px"></textarea>

<input class="input"
id="phone"
placeholder="Phone">

<input class="input"
id="email"
placeholder="Email">

<input class="input"
id="image"
placeholder="Profile Image URL">

<input class="input"
id="instagram"
placeholder="Instagram Link">

<input class="input"
id="whatsapp"
placeholder="WhatsApp Link">

</div>

<button class="btn"
onclick="addClient()">

<i class="fas fa-plus"></i>
Add Client

</button>

</div>

<!-- CLIENTS -->

<div class="clients"
id="clientsList"></div>

<!-- FIREBASE -->

<script type="module">

import {
initializeApp
}

from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getFirestore,
collection,
addDoc,
getDocs

}

from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* CONFIG */

const firebaseConfig = {

  apiKey: "AIzaSyD5XXOXRaVgXvkuwZ0hParJ-iipkA9uGKo",

  authDomain: "flextech-2324d.firebaseapp.com",

  projectId: "flextech-2324d",

  storageBucket: "flextech-2324d.firebasestorage.app",

  messagingSenderId: "511190640221",

  appId: "1:511190640221:web:20701272956f01e22c0fb4"

};

/* INIT */

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

/* ADD CLIENT */

window.addClient =
async function(){

    const client = {

        id:
        document.getElementById("id").value,

        name:
        document.getElementById("name").value,

        role:
        document.getElementById("role").value,
        
        company:
document.getElementById("company").value,

bio:
document.getElementById("bio").value,

        phone:
        document.getElementById("phone").value,

        email:
        document.getElementById("email").value,

        image:
        document.getElementById("image").value,

        socials:{

            instagram:
            document.getElementById("instagram").value,

            whatsapp:
            document.getElementById("whatsapp").value

        }

    };

    await addDoc(
    collection(db,"clients"),
    client
    );

    alert("Client Added 🔥");

    loadClients();
}

/* LOAD CLIENTS */

async function loadClients(){

    const querySnapshot =
    await getDocs(collection(db,"clients"));

    let html = "";

    querySnapshot.forEach((doc)=>{

        const client = doc.data();

        const link =
`clients/template.html?id=${client.id}`;

        const qr =
`https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${window.location.origin}/${link}`;

        html += `

        <div class="client-card">

            <div class="top">

                <img src="${client.image}">

                <div class="info">

                    <h2>
                        ${client.name}
                    </h2>

                    <p>
                        ${client.role}
                    </p>

                </div>

            </div>

            <div class="content">

                <p>
                    ${client.email}
                </p>

                <div class="actions">

                    <a class="action-btn view"
                    target="_blank"
                    href="${link}">

                        View

                    </a>

                    <a class="action-btn qr"
                    target="_blank"
                    href="${qr}">

                        QR

                    </a>

                </div>

            </div>

        </div>

        `;
    });

    document.getElementById("clientsList").innerHTML =
    html;
}

/* START */

loadClients();

</script>

</body>
</html>
