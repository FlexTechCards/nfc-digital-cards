<script type="module">

import {
initializeApp
}

from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getFirestore,
collection,
getDocs

}

from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE CONFIG */

const firebaseConfig = {

  apiKey: "AIzaSyD5XXOXRaVgXvkuwZ0hParJ-iipkA9uGKo",

  authDomain: "flextech-2324d.firebaseapp.com",

  projectId: "flextech-2324d",

  storageBucket: "flextech-2324d.firebasestorage.app",

  messagingSenderId: "511190640221",

  appId: "1:511190640221:web:20701272956f01e22c0fb4"

};

/* INIT */

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

/* GET CLIENT ID */

const params =
new URLSearchParams(window.location.search);

const clientId =
params.get("id");

/* LOAD CLIENT */

async function loadClient(){

    const querySnapshot =
    await getDocs(collection(db,"clients"));

    let found = false;

    querySnapshot.forEach((doc)=>{

        const client = doc.data();

        if(client.id === clientId){

            found = true;

            /* DATA */

            document.getElementById("name").innerHTML =
            client.name || "";

            document.getElementById("role").innerHTML =
            client.role || "";

            document.getElementById("bio").innerHTML =
            client.bio || "";

            document.getElementById("phone").innerHTML =
            client.phone || "";

            document.getElementById("email").innerHTML =
            client.email || "";

            document.getElementById("profileImage").src =
            client.image || "";

            /* LINKS */

            document.getElementById("phoneLink").href =
            `tel:${client.phone}`;

            document.getElementById("emailLink").href =
            `mailto:${client.email}`;

            /* SOCIALS */

            let socialsHTML = "";

            const icons = {

                instagram:
                "fab fa-instagram",

                whatsapp:
                "fab fa-whatsapp",

                linkedin:
                "fab fa-linkedin-in",

                tiktok:
                "fab fa-tiktok",

                facebook:
                "fab fa-facebook-f",

                telegram:
                "fab fa-telegram-plane"
            };

            if(client.socials){

                for(let social in client.socials){

                    if(client.socials[social]){

                        socialsHTML += `

                        <a class="social ${social}"
                        href="${client.socials[social]}"
                        target="_blank">

                            <i class="${icons[social]}"></i>

                        </a>

                        `;
                    }
                }

            }

            document.getElementById("socials").innerHTML =
            socialsHTML;

        }

    });

    /* NOT FOUND */

    if(!found){

        document.body.innerHTML = `

        <div style="
        color:white;
        text-align:center;
        margin-top:120px;
        font-family:Arial;
        ">

            <h1>
                Client Not Found
            </h1>

        </div>

        `;
    }

}

/* START */

loadClient();

/* SHARE */

window.shareCard = function(){

    if(navigator.share){

        navigator.share({

            title:"FlexTech Digital Card",

            text:"Check my digital business card",

            url:window.location.href

        });

    }

}

/* SAVE CONTACT */

window.saveContact = function(){

    alert("VCF System Coming Soon 🔥");

}

</script>
