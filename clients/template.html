<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlexTech Client Card</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
    text-align:center;
    padding-bottom:40px;
}
.container{
    max-width:500px;
    margin:auto;
    padding:20px;
}
.profile-img{
    width:140px;
    height:140px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid #38bdf8;
    margin-top:30px;
}
.name{
    font-size:28px;
    font-weight:800;
    margin-top:15px;
}
.role{
    color:#94a3b8;
    margin-bottom:10px;
}
.section{
    margin-top:25px;
    text-align:left;
}
.section h3{
    color:#38bdf8;
    margin-bottom:10px;
}
.link{
    display:block;
    background:#1e293b;
    padding:14px;
    border-radius:12px;
    margin-bottom:10px;
    color:white;
    text-decoration:none;
    font-weight:bold;
}
</style>

</head>

<body>

<div class="container">

    <img id="image" class="profile-img" src="">
    <div id="name" class="name"></div>
    <div id="role" class="role"></div>
    <div id="company" class="role"></div>

    <div class="section">
        <h3>Contact</h3>
        <a id="phone" class="link" href="#">Phone</a>
        <a id="email" class="link" href="#">Email</a>
    </div>

    <div class="section">
        <h3>Social Media</h3>
        <a id="instagram" class="link" href="#">Instagram</a>

        <!-- 🔥 زر الواتساب بعد التعديل الصحيح -->
        <a id="whatsapp" class="link" href="#" target="_blank">WhatsApp</a>

        <a id="linkedin" class="link" href="#">LinkedIn</a>
        <a id="facebook" class="link" href="#">Facebook</a>
        <a id="tiktok" class="link" href="#">TikTok</a>
        <a id="telegram" class="link" href="#">Telegram</a>
    </div>

</div>

<script type="module">

import { 
    initializeApp 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { 
    getFirestore, 
    collection, 
    query, 
    where, 
    getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyD5XXOXRaVgXvkuwZ0hParJ-iipkA9uGKo",
    authDomain: "flextech-2324d.firebaseapp.com",
    projectId: "flextech-2324d",
    storageBucket: "flextech-2324d.firebasestorage.app",
    messagingSenderId: "511190640221",
    appId: "1:511190640221:web:20701272956f01e22c0fb4"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const urlParams = new URLSearchParams(window.location.search);
const clientId = urlParams.get("id");

async function loadClient() {
    const q = query(collection(db, "clients"), where("id", "==", clientId));
    const snapshot = await getDocs(q);

    snapshot.forEach((docItem) => {
        const c = docItem.data();

        document.getElementById("image").src = c.image || "";
        document.getElementById("name").innerText = c.name || "";
        document.getElementById("role").innerText = c.role || "";
        document.getElementById("company").innerText = c.company || "";

        document.getElementById("phone").href = "tel:" + (c.phone || "");
        document.getElementById("phone").innerText = c.phone || "Phone";

        document.getElementById("email").href = "mailto:" + (c.email || "");
        document.getElementById("email").innerText = c.email || "Email";

        document.getElementById("instagram").href = c.socials?.instagram || "#";

        /* 🔥 زر الواتساب بعد التعديل */
        document.getElementById("whatsapp").href =
            c.socials?.whatsapp
            ? `https://wa.me/${c.socials.whatsapp.replace(/[^0-9]/g, "")}`
            : "#";

        document.getElementById("linkedin").href = c.socials?.linkedin || "#";
        document.getElementById("facebook").href = c.socials?.facebook || "#";
        document.getElementById("tiktok").href = c.socials?.tiktok || "#";
        document.getElementById("telegram").href = c.socials?.telegram || "#";
    });
}

loadClient();

</script>

</body>
</html>
