<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FlexTech Digital Card</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
background:#0b1a3a;
display:flex;
justify-content:center;
padding:25px;
min-height:100vh;
}

/* CARD */
.card{
width:390px;
background:#f8fafc;
border-radius:40px;
overflow:hidden;
box-shadow:0 25px 70px rgba(0,0,0,.45);
}

/* HEADER — NEW DESIGN */
.header{
background:linear-gradient(180deg,#0d1f4d,#07142f);
padding:35px 25px 90px;
position:relative;
text-align:center;
}

.profile{
width:150px;
height:150px;
border-radius:50%;
object-fit:cover;
border:6px solid white;
box-shadow:0 10px 30px rgba(0,0,0,.35);
position:absolute;
bottom:-75px;
left:50%;
transform:translateX(-50%);
}

.header-info .name{
font-size:30px;
font-weight:800;
color:white;
margin-top:90px;
}

.header-info .role{
font-size:17px;
color:#dbeafe;
margin-top:8px;
}

.header-info .company{
font-size:15px;
color:#9fb6d9;
margin-top:6px;
}

/* CONTENT */
.content{
padding:100px 25px 30px;
text-align:center;
}

.bio{
font-size:15px;
line-height:1.7;
color:#475569;
margin-bottom:25px;
}

/* CONTACT BOX */
.contact-box{
background:#eef2ff;
padding:14px 18px;
border-radius:18px;
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:12px;
text-decoration:none;
}

.contact-left{
display:flex;
align-items:center;
gap:12px;
}

.icon{
width:46px;
height:46px;
border-radius:14px;
background:linear-gradient(145deg,#02142f,#07245f);
display:flex;
justify-content:center;
align-items:center;
color:white;
font-size:22px;
}

.label{
font-size:12px;
color:#64748b;
}

.value{
font-size:15px;
font-weight:700;
color:#0f172a;
}

/* SOCIAL ICONS */
.socials{
display:flex;
justify-content:center;
gap:18px;
margin:30px 0;
}

.social{
width:82px;
height:82px;
border-radius:28px;
background:rgba(255,255,255,0.10);
backdrop-filter:blur(6px);
box-shadow:0 8px 20px rgba(0,0,0,.15);
display:flex;
justify-content:center;
align-items:center;
}

.social img{
width:60%;
height:60%;
object-fit:contain;
filter:drop-shadow(0 2px 4px rgba(0,0,0,0.35)) brightness(1.1);
}

/* BUTTONS */
.btn{
width:100%;
padding:20px;
border-radius:20px;
font-size:18px;
font-weight:800;
border:none;
cursor:pointer;
margin-bottom:15px;
}

.primary{
background:linear-gradient(145deg,#02142f,#07245f);
color:white;
}

.secondary{
background:#e2e8f0;
color:#1e293b;
}

/* FOOTER */
.footer{
text-align:center;
padding:10px 0 20px;
font-size:13px;
color:#64748b;
}
</style>

</head>

<body>

<div class="card">

<!-- HEADER -->
<div class="header">
    <img id="profileImage" class="profile" loading="lazy">

    <div class="header-info">
        <div id="name" class="name"></div>
        <div id="role" class="role"></div>
        <div id="company" class="company"></div>
    </div>
</div>

<!-- CONTENT -->
<div class="content">

    <div id="bio" class="bio"></div>

    <!-- CONTACT BOXES -->
    <a id="phoneLink" class="contact-box">
        <div class="contact-left">
            <div class="icon">📞</div>
            <div class="contact-text">
                <div class="label">Mobile</div>
                <div id="phone" class="value"></div>
            </div>
        </div>
    </a>

    <a id="emailLink" class="contact-box">
        <div class="contact-left">
            <div class="icon">✉️</div>
            <div class="contact-text">
                <div class="label">Email</div>
                <div id="email" class="value"></div>
            </div>
        </div>
    </a>

    <a id="landlineLink" class="contact-box">
        <div class="contact-left">
            <div class="icon">☎️</div>
            <div class="contact-text">
                <div class="label">Landline</div>
                <div id="landline" class="value"></div>
            </div>
        </div>
    </a>

    <!-- SOCIAL ICONS -->
    <div id="socials" class="socials"></div>

    <!-- BUTTONS -->
    <button class="btn primary" onclick="saveContact()">Add To Contacts</button>
    <button class="btn secondary" onclick="shareCard()">Share Card</button>

    <!-- FOOTER -->
    <div class="footer">Powered by FlexTech</div>

</div>

</div>

<!-- FIREBASE + JS -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, query, where, getDocs, updateDoc, increment } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyD5XXOXRaVgXvkuwZ0hParJ-iipkA9uGKo",
authDomain: "flextech-2324d.firebaseapp.com",
projectId: "flextech-2324d",
storageBucket: "flextech-2324d.firebasestorage.app",
messagingSenderId: "511190640221",
appId: "1:511190640221:web:20701272956f01e22c0fb4"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const params = new URLSearchParams(window.location.search);
const clientId = params.get("id");

async function loadClient() {

try {

const q = query(collection(db, "clients"), where("id", "==", clientId));
const querySnapshot = await getDocs(q);

if (querySnapshot.empty) {
document.body.innerHTML = `<div style="color:white;text-align:center;margin-top:40px;font-size:22px;">Client Not Found ❌</div>`;
return;
}

const docRef = querySnapshot.docs[0].ref;
const client = querySnapshot.docs[0].data();

await updateDoc(docRef, { views: increment(1) });

document.getElementById("name").innerHTML = client.name || "";
document.getElementById("role").innerHTML = client.role || "";
document.getElementById("company").innerHTML = client.company || "";
document.getElementById("bio").innerHTML = client.bio || "";
document.getElementById("phone").innerHTML = client.phone || "";
document.getElementById("email").innerHTML = client.email || "";
document.getElementById("profileImage").src = client.image || "";

document.getElementById("phoneLink").href = client.phone ? `tel:${client.phone}` : "#";
document.getElementById("emailLink").href = client.email ? `mailto:${client.email}` : "#";

if (client.landline) {
document.getElementById("landline").innerHTML =
client.extension ? `${client.landline} | EXT: ${client.extension}` : client.landline;
document.getElementById("landlineLink").href = `tel:${client.landline}`;
} else {
document.getElementById("landlineLink").style.display = "none";
}

/* SOCIAL ICONS — ORIGINAL APP ICONS */
let socialsHTML = "";

const icons = {
instagram: "https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg",
facebook: "https://upload.wikimedia.org/wikipedia/commons/1/1b/Facebook_icon.svg",
whatsapp: "https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg",
linkedin: "https://upload.wikimedia.org/wikipedia/commons/8/81/LinkedIn_icon.svg",
telegram: "https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg",
tiktok: "https://upload.wikimedia.org/wikipedia/en/0/0a/TikTok_logo.svg"
};

if (client.socials && typeof client.socials === "object") {

for (let social in icons) {
if (client.socials[social]) {
socialsHTML += `
<a class="social ${social}" href="${client.socials[social]}" target="_blank">
<img src="${icons[social]}">
</a>`;
}
}

}

document.getElementById("socials").innerHTML = socialsHTML;

} catch (error) {

document.body.innerHTML = `
<div style="color:white;text-align:center;margin-top:40px;font-size:22px;">
Error Loading Card ❌<br><br>${error}
</div>`;
}

}

loadClient();

window.shareCard = function () {
if (navigator.share) {
navigator.share({
title: "FlexTech Digital Card",
text: "Check my digital business card",
url: window.location.href
});
}
};

window.saveContact = function () {

const name = document.getElementById("name").innerText;
const phone = document.getElementById("phone").innerText;
const email = document.getElementById("email").innerText;

const vcf = `
BEGIN:VCARD
VERSION:3.0
N;CHARSET=UTF-8:${name}
FN;CHARSET=UTF-8:${name}
TEL;TYPE=CELL:${phone}
EMAIL;CHARSET=UTF-8:${email}
END:VCARD
`;

const blob = new Blob([vcf], { type: "text/vcard;charset=utf-8" });
const link = document.createElement("a");
link.href = URL.createObjectURL(blob);
link.download = `${name}.vcf`;
link.click();
};

</script>

</body>
</html>
