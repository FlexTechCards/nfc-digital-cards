<script type="module">

import { 
    initializeApp 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { 
    getFirestore,
    collection,
    query,
    where,
    getDocs,
    doc,
    updateDoc,
    increment
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyD5XXOXRaVgXvkuwZ0hParJ-iipkA9uGKo",
    authDomain: "flextech-2324d.firebaseapp.com",
    projectId: "flextech-2324d",
    storageBucket: "flextech-2324d.firebasestorage.app",
    messagingSenderId: "511190640221",
    appId: "1:511190640221:web:20701272956f01e22c0fb4"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const params = new URLSearchParams(window.location.search);
const clientId = params.get("id");

async function loadClient() {

    const q = query(
        collection(db, "clients"),
        where("id", "==", clientId)
    );

    const querySnapshot = await getDocs(q);

    if (querySnapshot.empty) {
        document.body.innerHTML = `
            <div style="color:white;text-align:center;margin-top:40px;font-size:22px;">
                Client Not Found ❌
            </div>
        `;
        return;
    }

    const docRef = querySnapshot.docs[0].ref;
    const client = querySnapshot.docs[0].data();

    // تسجيل زيارة
    await updateDoc(docRef, {
        views: increment(1)
    });

    // تعبئة البيانات
    document.getElementById("name").innerHTML = client.name || "";
    document.getElementById("role").innerHTML = client.role || "";
    document.getElementById("company").innerHTML = client.company || "";
    document.getElementById("bio").innerHTML = client.bio || "";

    document.getElementById("landlineBox").innerHTML =
        client.landline
            ? `Landline: ${client.landline} ${client.extension ? " | EXT: " + client.extension : ""}`
            : "";

    document.getElementById("phone").innerHTML = client.phone || "";
    document.getElementById("email").innerHTML = client.email || "";
    document.getElementById("profileImage").src = client.image || "";

    document.getElementById("phoneLink").href = `tel:${client.phone}`;
    document.getElementById("emailLink").href = `mailto:${client.email}`;

    // السوشيال ميديا
    let socialsHTML = "";
    const icons = {
        instagram: "fab fa-instagram",
        whatsapp: "fab fa-whatsapp",
        linkedin: "fab fa-linkedin-in",
        facebook: "fab fa-facebook-f",
        telegram: "fab fa-telegram-plane",
        tiktok: "fab fa-tiktok"
    };

    if (client.socials) {
        for (let social in client.socials) {
            if (client.socials[social]) {
                socialsHTML += `
                    <a class="social ${social}" href="${client.socials[social]}" target="_blank">
                        <i class="${icons[social]}"></i>
                    </a>
                `;
            }
        }
    }

    document.getElementById("socials").innerHTML = socialsHTML;
}

loadClient();

// مشاركة البطاقة
window.shareCard = function () {
    if (navigator.share) {
        navigator.share({
            title: "FlexTech Digital Card",
            text: "Check my digital business card",
            url: window.location.href
        });
    }
};

// حفظ جهة الاتصال
window.saveContact = function () {
    const name = document.getElementById("name").innerText;
    const phone = document.getElementById("phone").innerText;
    const email = document.getElementById("email").innerText;

    const vcf = `
BEGIN:VCARD
VERSION:3.0
FN:${name}
TEL:${phone}
EMAIL:${email}
END:VCARD
`;

    const blob = new Blob([vcf], { type: 'text/vcard' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `${name}.vcf`;
    link.click();
};

</script>
