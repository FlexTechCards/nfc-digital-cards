<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlexTech Premium Card</title>

  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:system-ui,-apple-system,Segoe UI,Roboto;
      background:radial-gradient(circle at center,#07245f 0%,#020817 100%);
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:24px 14px;
    }

    .card{
      width:390px;
      background:#f8fafc;
      border-radius:40px;
      overflow:hidden;
      box-shadow:0 40px 100px rgba(0,0,0,.55);
      position:relative;
    }

    .header{
      background:#010f2d;
      min-height:220px;
      padding:26px 22px;
      border-bottom-left-radius:50px;
      position:relative;
      overflow:hidden;
    }

    .profile-section{
      display:flex;
      align-items:center;
      gap:14px;
      position:relative;
      z-index:2;
    }

    .profile{
      width:160px;
      height:160px;
      border-radius:50%;
      object-fit:cover;
      border:6px solid rgba(255,255,255,.98);
      box-shadow:0 15px 35px rgba(0,0,0,.38);
      position:relative;
      top:0;
    }

    .info{flex:1;}

    .name{
      font-size:28px;
      font-weight:800;
      color:white;
      margin-bottom:8px;
    }

    .role{
      font-size:15px;
      color:#dbeafe;
      margin-bottom:12px;
    }

    .line{
      width:56px;
      height:5px;
      background:#22d3ee;
      border-radius:50px;
      margin-bottom:12px;
    }

    .job{
      font-size:14px;
      color:#cbd5e1;
    }

    .content{
      padding:24px 22px 20px;
    }

    .bio{
      font-size:16px;
      color:#4b5563;
      line-height:1.8;
      margin-bottom:20px;
    }

    .contact{
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .contact-box{
      background:white;
      border-radius:18px;
      padding:12px 14px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      border:1px solid #dbe2ea;
      text-decoration:none;
      transition:.25s;
    }

    .contact-box:hover{
      transform:translateY(-3px);
    }

    .contact-left{
      display:flex;
      align-items:center;
      gap:14px;
    }

    .icon{
      width:48px;
      height:48px;
      border-radius:16px;
      background:linear-gradient(145deg,#02142f,#07245f);
      display:flex;
      justify-content:center;
      align-items:center;
      color:white;
      font-size:20px;
      box-shadow:0 8px 18px rgba(0,0,0,.15);
    }

    .contact-text{
      display:flex;
      flex-direction:column;
    }

    .label{
      font-size:13px;
      color:#64748b;
    }

    .value{
      font-size:16px;
      font-weight:800;
      color:#0f172a;
      word-break:break-all;
      white-space:normal;
    }

    .arrow{
      color:#64748b;
      font-size:20px;
    }

    .socials{
      display:flex;
      justify-content:center;
      gap:14px;
      margin:22px 0;
      flex-wrap:wrap;
    }

    .social{
      width:68px;
      height:68px;
      border-radius:22px;
      display:flex;
      justify-content:center;
      align-items:center;
      text-decoration:none;
      font-size:36px;
      color:white;
      transition:.25s;
      box-shadow:0 10px 20px rgba(0,0,0,.15);
    }

    .social:hover{
      transform:translateY(-5px) scale(1.04);
    }

    .instagram{background:linear-gradient(135deg,#f58529,#dd2a7b,#8134af);}
    .whatsapp{background:#22c55e;}
    .linkedin{background:#0077b5;}
    .tiktok{background:black;}
    .facebook{background:#1877f2;}
    .telegram{background:#229ED9;}
    .app{background:#0ea5e9;}

    .actions{
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .btn{
      border:none;
      border-radius:20px;
      padding:17px;
      font-size:17px;
      font-weight:800;
      cursor:pointer;
      display:flex;
      justify-content:center;
      align-items:center;
      gap:12px;
      transition:.25s;
    }

    .primary{
      background:linear-gradient(145deg,#02142f,#07245f);
      color:white;
    }

    .secondary{
      background:linear-gradient(145deg,#eef2ff,#dbe7ff);
      color:#173a7a;
    }

    .btn:hover{
      transform:scale(1.02);
    }

    .footer{
      margin-top:14px;
      padding-top:10px;
      border-top:1px solid #dbe2ea;
      display:flex;
      justify-content:center;
      align-items:center;
      gap:12px;
      text-decoration:none;
      transition:.25s;
    }

    .footer:hover{
      transform:scale(1.02);
    }

    .created{
      color:#64748b;
      font-size:15px;
    }

    .footer img{
      width:110px;
      object-fit:contain;
    }
  </style>
</head>

<body>
<div class="card">

  <div class="header">
    <div class="profile-section">
      <img id="profileImage" class="profile" loading="lazy">
      <div class="info">
        <div id="name" class="name"></div>
        <div id="role" class="role"></div>
        <div class="line"></div>
        <div id="company" class="job"></div>
      </div>
    </div>
  </div>

  <div class="content">

    <div id="bio" class="bio"></div>

    <div class="contact">

      <a id="phoneLink" class="contact-box">
        <div class="contact-left">
          <div class="icon"><i class="fas fa-phone"></i></div>
          <div class="contact-text">
            <div class="label">Mobile</div>
            <div id="phone" class="value"></div>
          </div>
        </div>
        <div class="arrow"><i class="fas fa-angle-right"></i></div>
      </a>

      <a id="emailLink" class="contact-box">
        <div class="contact-left">
          <div class="icon"><i class="fas fa-envelope"></i></div>
          <div class="contact-text">
            <div class="label">Email</div>
            <div id="email" class="value"></div>
          </div>
        </div>
        <div class="arrow"><i class="fas fa-phone-office"></i>
      </a>

      <a id="landlineLink" class="contact-box">
        <div class="contact-left">
          <div class="icon"><i class="fas fa-phone-volume"></i></div>
          <div class="contact-text">
            <div class="label">Landline</div>
            <div id="landline" class="value"></div>
          </div>
        </div>
        <div class="arrow"><i class="fas fa-angle-right"></i></div>
      </a>

    </div>

    <div id="socials" class="socials"></div>

    <div class="actions">
      <button class="btn primary" onclick="saveContact()">
        <i class="fas fa-user-plus"></i> Add To Contacts
      </button>
      <button class="btn secondary" onclick="shareCard()">
        <i class="fas fa-share-alt"></i> Share Card
      </button>
    </div>

    <a class="footer"
       href="https://www.instagram.com/flex.tech1"
       target="_blank">
      <span class="created">Powered by</span>
      <img src="https://i.imgur.com/LmWt6sc.png">
    </a>

  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getFirestore,
    collection,
    query,
    where,
    getDocs,
    updateDoc,
    increment
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD5XXOXRaVgXvkuwZ0hParJ-iipkA9uGKo",
    authDomain: "flextech-2324d.firebaseapp.com",
    projectId: "flextech-2324d",
    storageBucket: "flextech-2324d.firebasestorage.app",
    messagingSenderId: "511190640221",
    appId: "1:511190640221:web:20701272956f01e22c0fb4"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const $ = (id) => document.getElementById(id);

  const params = new URLSearchParams(window.location.search);
  const clientId = params.get("id");

  async function loadClient() {
    try {
      const q = query(collection(db, "clients"), where("id", "==", clientId));
      const querySnapshot = await getDocs(q);

      if (querySnapshot.empty) {
        document.body.innerHTML =
          `<div style="color:white;text-align:center;margin-top:40px;font-size:22px;">Client Not Found ❌</div>`;
        return;
      }

      const docRef = querySnapshot.docs[0].ref;
      const client = querySnapshot.docs[0].data();

      await updateDoc(docRef, { views: increment(1) });

      $("name").innerHTML = client.name || "";
      $("role").innerHTML = client.role || "";
      $("company").innerHTML = client.company || "";
      $("bio").innerHTML = client.bio || "";
      $("phone").innerHTML = client.phone || "";
      $("email").innerHTML = client.email || "";
      $("profileImage").src = client.image || "";

      $("phoneLink").href = client.phone ? `tel:${client.phone}` : "#";
      $("emailLink").href = client.email ? `mailto:${client.email}` : "#";

      if (client.landline) {
        $("landline").innerHTML =
          client.extension
            ? `${client.landline} | EXT: ${client.extension}`
            : client.landline;
        $("landlineLink").href = `tel:${client.landline}`;
      } else {
        $("landlineLink").style.display = "none";
      }

      // ⭐ تحسين جذري + إصلاح appLink
      client.socials = client.socials || {};

      client.socials.app =
        client.socials.app ||
        client.socials.appLink ||
        client.appLink ||
        "";

      const map = {
        instagram: { cls: "instagram", icon: "fab fa-instagram" },
        whatsapp: { cls: "whatsapp", icon: "fab fa-whatsapp" },
        linkedin: { cls: "linkedin", icon: "fab fa-linkedin-in" },
        tiktok: { cls: "tiktok", icon: "fab fa-tiktok" },
        facebook: { cls: "facebook", icon: "fab fa-facebook-f" },
        telegram: { cls: "telegram", icon: "fab fa-telegram" },
        app: { cls: "app", icon: "fab fa-android" }
      };

      const socialsList = [];

      for (let key in map) {
        const link = client.socials[key];
        if (link && link.trim() !== "") {
          socialsList.push(`
            <a class="social ${map[key].cls}" href="${link}" target="_blank">
              <i class="${map[key].icon}"></i>
            </a>
          `);
        }
      }

      $("socials").innerHTML = socialsList.join("");

    } catch (error) {
      console.error(error);
      document.body.innerHTML = `
        <div style="color:white;text-align:center;margin-top:40px;font-size:22px;">
          Error Loading Card ❌<br><br>${error}
        </div>`;
    }
  }

  loadClient();

  window.shareCard = function () {
    const name = $("name")?.innerText || "FlexTech Digital Card";
    if (navigator.share) {
      navigator.share({
        title: name,
        text: "Check my digital business card",
        url: window.location.href
      }).catch(()=>{});
    } else {
      prompt("Copy this link:", window.location.href);
    }
  };

  window.saveContact = function () {
    const name = $("name").innerText;
    const phone = $("phone").innerText;
    const email = $("email").innerText;

    const vcf = [
      "BEGIN:VCARD",
      "VERSION:3.0",
      `N;CHARSET=UTF-8:${name}`,
      `FN;CHARSET=UTF-8:${name}`,
      `TEL;TYPE=CELL:${phone}`,
      `EMAIL;CHARSET=UTF-8:${email}`,
      "END:VCARD"
    ].join("\n");

    const blob = new Blob([vcf], { type: "text/vcard;charset=utf-8" });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = `${name}.vcf`;
    link.click();
  };
</script>
</body>
</html>
