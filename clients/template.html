<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FlexTech Card</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<link rel="stylesheet"
href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=apk_install" />

<style>
/* ———— RESET ———— */
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Arial,sans-serif;
background:radial-gradient(circle at top,#08245f 0%,#020817 100%);
display:flex;
justify-content:center;
padding:20px;
min-height:100vh;
}

/* ———— CARD ———— */
.card{
width:400px;background:#f8fafc;border-radius:40px;overflow:hidden;
box-shadow:0 30px 80px rgba(0,0,0,.45);
}

/* ———— HEADER ———— */
.header{
background:
linear-gradient(rgba(1,15,45,.88),rgba(1,15,45,.94)),
url("https://images.unsplash.com/photo-1557683316-973673baf926?q=80&w=1200");
background-size:cover;background-position:center;
padding:22px 20px 65px;border-bottom-left-radius:90px;
position:relative;overflow:hidden;opacity:0;
animation: fadeInUp 0.9s cubic-bezier(.25,.46,.45,.94) forwards;
animation-delay:0.1s;
}

.profile-area{display:flex;align-items:flex-start;gap:22px;}

.profile{
width:170px;height:170px;border-radius:50%;object-fit:cover;
border:6px solid white;box-shadow:0 15px 40px rgba(0,0,0,.35);
opacity:0;animation: fadeInUp 1s ease-out forwards, softFloat 6s ease-in-out infinite;
animation-delay:0.25s;
}

.info{flex:1;padding-top:8px;opacity:0;animation: fadeInUp 1s ease-out forwards;animation-delay:0.35s;}

.name{font-size:34px;font-weight:800;color:white;line-height:1.05;margin-bottom:14px;}
.role{font-size:17px;line-height:1.6;color:#dbeafe;margin-bottom:18px;}
.line{width:78px;height:6px;border-radius:50px;background:#22d3ee;margin-bottom:20px;}
.company{font-size:16px;line-height:1.8;color:#cbd5e1;}

.content{padding:15px 22px 20px;}

.bio{
font-size:17px;line-height:1.9;color:#4b5563;margin-bottom:22px;
opacity:0;animation: fadeInUp 1s ease-out forwards;animation-delay:0.45s;
word-wrap: break-word;overflow-wrap: break-word;white-space: normal;
}

/* ———— CONTACT BOX ———— */
.contact-box{
background:rgba(255,255,255,0.65);backdrop-filter:blur(8px);
border-radius:18px;padding:12px 16px;display:flex;align-items:center;
justify-content:space-between;margin-bottom:12px;text-decoration:none;
border:1px solid rgba(255,255,255,0.35);box-shadow:0 3px 8px rgba(0,0,0,.05);
opacity:0;animation: fadeInUp 1s ease-out forwards;transition:0.35s;
color:#0f172a !important;
}

.contact-left{display:flex;align-items:center;gap:12px;}

.icon{
width:46px;height:46px;border-radius:14px;
background:linear-gradient(145deg,#02142f,#07245f);
display:flex;justify-content:center;align-items:center;
font-size:22px;color:white;
}

.contact-text{display:flex;flex-direction:column;}
.label{font-size:13px;color:#64748b;margin-bottom:4px;}
.value{font-size:15px;font-weight:700;color:#0f172a !important;max-width:190px;line-height:1.4;}

.arrow{font-size:26px;color:#64748b;}

/* ———— SOCIALS ———— */
.socials{
display:flex;justify-content:center;gap:18px;margin:25px 0;
opacity:0;animation: fadeInUp 1s ease-out forwards;animation-delay:0.9s;
}

.social{
width:82px;height:82px;border-radius:28px;display:flex;
justify-content:center;align-items:center;font-size:44px;
color:white;text-decoration:none;transition:0.35s;
background:rgba(255,255,255,0.1);backdrop-filter:blur(6px);
box-shadow:0 8px 20px rgba(0,0,0,.15);
}

/* ———— ACTION BUTTONS ———— */
.actions{display:flex;flex-direction:column;gap:18px;opacity:0;
animation: fadeInUp 1s ease-out forwards;animation-delay:1.05s;}

.btn{
border:none;border-radius:24px;padding:22px;font-size:20px;
font-weight:800;cursor:pointer;display:flex;justify-content:center;
align-items:center;gap:14px;transition:0.35s;
}

.primary{background:linear-gradient(145deg,#02142f,#07245f);color:white;}
.secondary{background:linear-gradient(145deg,#e0e7ff,#dbeafe);color:#173a7a;}

/* ———— FOOTER ———— */
.footer{
margin-top:14px;padding-top:10px;padding-bottom:2px;border-top:1px solid #dbe2ea;
display:flex;justify-content:center;align-items:center;gap:8px;
opacity:0;animation: fadeInUp 1s ease-out forwards;animation-delay:1.2s;
}

.footer img{width:110px;}

@media(max-width:450px){
.card{width:100%;}
.profile{width:150px;height:150px;}
.name{font-size:30px;}
.social{width:74px;height:74px;font-size:38px;}
}

/* ———— ANIMATIONS ———— */
@keyframes fadeInUp {
0% {opacity:0;transform:translateY(20px) scale(0.98);filter:blur(6px);}
60% {opacity:1;transform:translateY(-2px) scale(1.01);filter:blur(0);}
100% {opacity:1;transform:translateY(0) scale(1);}
}

@keyframes softFloat {
0% {transform:translateY(0);}
50% {transform:translateY(-6px);}
100% {transform:translateY(0);}
}

</style>

</head>

<body>

<div class="card">

<div class="header">
<div class="profile-area">
<img id="profileImage" class="profile" loading="lazy">
<div class="info">
<div id="name" class="name"></div>
<div id="role" class="role"></div>
<div class="line"></div>
<div id="company" class="company"></div>
</div>
</div>
</div>

<div class="content">

<div id="bio" class="bio"></div>

<a id="landlineLink" class="contact-box">
<div class="contact-left">
<div class="icon"><i class="bi bi-telephone-fill"></i></div>
<div class="contact-text">
<div class="label">Landline</div>
<div id="landline" class="value"></div>
</div>
</div>
<div class="arrow">›</div>
</a>

<a id="phoneLink" class="contact-box">
<div class="contact-left">
<div class="icon"><i class="bi bi-phone-fill"></i></div>
<div class="contact-text">
<div class="label">Mobile</div>
<div id="phone" class="value"></div>
</div>
</div>
<div class="arrow">›</div>
</a>

<a id="emailLink" class="contact-box">
<div class="contact-left">
<div class="icon"><i class="bi bi-envelope-fill"></i></div>
<div class="contact-text">
<div class="label">Email</div>
<div id="email" class="value"></div>
</div>
</div>
<div class="arrow">›</div>
</a>

<div id="socials" class="socials"></div>

<div class="actions">
<button class="btn primary" onclick="saveContact()">
<i class="bi bi-person-plus-fill"></i> Add To Contacts
</button>

<button class="btn secondary" onclick="shareCard()">
<i class="bi bi-share-fill"></i> Share Card
</button>
</div>

<div class="footer">
<div class="created">powered by</div>
<a href="https://instagram.com/flex.tech1" target="_blank">
<img src="https://i.imgur.com/LmWt6sc.png">
</a>
</div>

</div>

</div>

<!-- ———— FIREBASE SCRIPT ———— -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, query, where, getDocs, updateDoc, increment } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyD5XXOXRaVgXvkuwZ0hParJ-iipkA9uGKo",
authDomain: "flextech-2324d.firebaseapp.com",
projectId: "flextech-2324d",
storageBucket: "flextech-2324d.firebasestorage.app",
messagingSenderId: "511190640221",
appId: "1:511190640221:web:20701272956f01e22c0fb4"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const params = new URLSearchParams(window.location.search);
const clientId = params.get("id");

async function loadClient() {

try {

const q = query(collection(db, "clients"), where("id", "==", clientId));
const querySnapshot = await getDocs(q);

if (querySnapshot.empty) {
document.body.innerHTML = `<div style="color:white;text-align:center;margin-top:40px;font-size:22px;">Client Not Found ❌</div>`;
return;
}

const docRef = querySnapshot.docs[0].ref;
const client = querySnapshot.docs[0].data();

await updateDoc(docRef, { views: increment(1) });

document.getElementById("name").innerHTML = client.name || "";
document.getElementById("role").innerHTML = client.role || "";
document.getElementById("company").innerHTML = client.company || "";
document.getElementById("bio").innerHTML = client.bio || "";
document.getElementById("phone").innerHTML = client.phone || "";
document.getElementById("email").innerHTML = client.email || "";
document.getElementById("profileImage").src = client.image || "";

document.getElementById("phoneLink").href = client.phone ? `tel:${client.phone}` : "#";
document.getElementById("emailLink").href = client.email ? `mailto:${client.email}` : "#";

if (client.landline) {
document.getElementById("landline").innerHTML =
client.extension ? `${client.landline} | EXT: ${client.extension}` : client.landline;
document.getElementById("landlineLink").href = `tel:${client.landline}`;
} else {
document.getElementById("landlineLink").style.display = "none";
}

/* ———— SOCIALS (Colored SVG Icons) ———— */
let socialsHTML = "";

const icons = {
instagram: "https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/instagram.svg",
facebook: "https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/facebook.svg",
whatsapp: "https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/whatsapp.svg",
linkedin: "https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/linkedin.svg",
telegram: "https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/telegram.svg",
tiktok: "https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/tiktok.svg"
};

if (client.socials && typeof client.socials === "object") {

for (let social in icons) {
if (client.socials[social]) {
socialsHTML += `
<a class="social ${social}" href="${client.socials[social]}" target="_blank">
<img src="${icons[social]}" style="width:44px;height:44px;">
</a>`;
}
}

if (client.socials.appLink) {
socialsHTML += `
<a class="social app" href="${client.socials.appLink}" target="_blank">
<span class="material-symbols-outlined" style="font-size:44px;color:#02142f;">apk_install</span>
</a>`;
}

}

document.getElementById("socials").innerHTML = socialsHTML;

} catch (error) {

document.body.innerHTML = `
<div style="color:white;text-align:center;margin-top:40px;font-size:22px;">
Error Loading Card ❌<br><br>${error}
</div>`;
}

}

loadClient();

window.shareCard = function () {
if (navigator.share) {
navigator.share({
title: "FlexTech Digital Card",
text: "Check my digital business card",
url: window.location.href
});
}
};

window.saveContact = function () {

const name = document.getElementById("name").innerText;
const phone = document.getElementById("phone").innerText;
const email = document.getElementById("email").innerText;

const vcf = `
BEGIN:VCARD
VERSION:3.0
N;CHARSET=UTF-8:${name}
FN;CHARSET=UTF-8:${name}
TEL;TYPE=CELL:${phone}
EMAIL;CHARSET=UTF-8:${email}
END:VCARD
`;

const blob = new Blob([vcf], { type: "text/vcard;charset=utf-8" });
const link = document.createElement("a");
link.href = URL.createObjectURL(blob);
link.download = `${name}.vcf`;
link.click();
};

</script>

</body>
</html>
