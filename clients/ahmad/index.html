<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ahmad NFC Card</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: radial-gradient(circle at top, #1e293b, #0f172a);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    padding: 30px;
    border-radius: 25px;
    width: 340px;
    text-align: center;
    box-shadow: 0 20px 50px rgba(0,0,0,0.6);
    border: 1px solid rgba(255,255,255,0.1);
}

img {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid #38bdf8;
    margin-bottom: 15px;
}

h1 {
    margin: 10px 0;
    font-size: 22px;
}

p {
    color: #cbd5e1;
    margin-bottom: 20px;
}

.btn {
    display: block;
    margin: 10px 0;
    padding: 12px;
    border-radius: 12px;
    text-decoration: none;
    color: white;
    font-weight: bold;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
}

.whatsapp { background: #22c55e; }
.call { background: #f59e0b; }
.email { background: #3b82f6; }
.save { background: #a855f7; }
</style>

</head>

<body>

<div class="card">

    <img src="https://i.imgur.com/gBpfXPZ.jpeg" alt="profile">

    <h1>Ahmad Shkri</h1>
    <p>Bank Teller | Digital Banking Specialist</p>

    <a class="btn whatsapp" href="https://wa.me/000000000">💬 WhatsApp</a>
    <a class="btn call" href="tel:000000000">📞 Call</a>
    <a class="btn email" href="mailto:test@email.com">📧 Email</a>

    <!-- ميزة جديدة -->
    <a class="btn save" href="data:text/vcard;charset=utf-8,BEGIN:VCARD%0AVERSION:3.0%0AFN=Ahmad%20Shkri%0ATEL:000000000%0AEND:VCARD">💾 Save Contact</a>

</div>

</body>
</html>
