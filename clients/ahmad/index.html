<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ahmad NFC Card</title>

<style>

body{
    margin:0;
    font-family: system-ui, -apple-system, Segoe UI, Roboto;
    background: radial-gradient(circle at top, #0f172a, #020617);
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

/* APP FRAME */
.app {
    width: 360px;
    border-radius: 28px;
    overflow: hidden;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 25px 80px rgba(0,0,0,0.7);
}

/* HEADER */
.header {
    height: 110px;
    background: linear-gradient(135deg, #6366f1, #06b6d4);
    position: relative;
}

/* PROFILE */
.profile {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    border: 4px solid rgba(255,255,255,0.2);
    object-fit: cover;
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    bottom: -50px;
}

/* CONTENT */
.content{
    padding: 60px 18px 20px;
    text-align:center;
}

h1{
    margin:10px 0 5px;
    font-size:22px;
}

p{
    margin:0 0 15px;
    color:#a1a1aa;
    font-size:13px;
}

/* ICON ROW */
.icons{
    display:flex;
    justify-content:center;
    gap:12px;
    margin:15px 0;
}

.icon{
    width:44px;
    height:44px;
    border-radius:14px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.1);
    transition:0.3s;
}

.icon:hover{
    transform: translateY(-4px);
    background: rgba(255,255,255,0.15);
}

/* BUTTONS */
.btn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    margin:10px 0;
    padding:14px;
    border-radius:16px;
    text-decoration:none;
    color:white;
    font-weight:600;
    background: rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.1);
    transition:0.25s;
}

.btn:hover{
    transform: scale(1.03);
    background: rgba(255,255,255,0.12);
}

/* SMALL ICON */
svg{
    width:18px;
    height:18px;
    fill:white;
}

.save{
    box-shadow: 0 0 0 1px #a855f733 inset;
}

.whatsapp{ box-shadow: 0 0 0 1px #22c55e33 inset; }
.call{ box-shadow: 0 0 0 1px #f59e0b33 inset; }
.email{ box-shadow: 0 0 0 1px #3b82f633 inset; }

</style>

</head>

<body>

<div class="app">

    <div class="header">
        <img class="profile" src="https://i.imgur.com/gBpfXPZ.jpeg">
    </div>

    <div class="content">

        <h1>Ahmad Shkri</h1>
        <p>Bank Teller | Digital Banking Specialist</p>

        <!-- ICONS -->
        <div class="icons">

            <a class="icon" href="https://wa.me/000000000">
                <svg viewBox="0 0 24 24"><path d="M20 3.5A10 10 0 0 0 3.5 20L2 22l2-1.5A10 10 0 1 0 20 3.5z"/></svg>
            </a>

            <a class="icon" href="tel:000000000">
                <svg viewBox="0 0 24 24"><path d="M6.6 10.8a15.1 15.1 0 0 0 6.6 6.6l2.2-2.2a1 1 0 0 1 1-.24c1.1.36 2.3.56 3.6.56a1 1 0 0 1 1 1V21a1 1 0 0 1-1 1A17 17 0 0 1 2 5a1 1 0 0 1 1-1h3.5a1 1 0 0 1 1 1c0 1.3.2 2.5.56 3.6a1 1 0 0 1-.24 1z"/></svg>
            </a>

            <a class="icon" href="mailto:test@email.com">
                <svg viewBox="0 0 24 24"><path d="M20 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2zm0 4-8 5L4 8V6l8 5 8-5z"/></svg>
            </a>

        </div>

        <!-- BUTTONS -->
        <a class="btn whatsapp" href="https://wa.me/000000000">
            WhatsApp
        </a>

        <a class="btn call" href="tel:000000000">
            Call Now
        </a>

        <a class="btn email" href="mailto:test@email.com">
            Email
        </a>

        <a class="btn save" href="contact.vcf" download>
            Save Contact
        </a>

    </div>

</div>

</body>
</html>
