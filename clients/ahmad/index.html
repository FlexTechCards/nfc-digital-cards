<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ahmad NFC Card</title>

<style>

body {
    margin: 0;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
    background: radial-gradient(circle at top, #111827, #0b1220);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

/* CARD */
.card {
    width: 340px;
    border-radius: 24px;
    overflow: hidden;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(18px);
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    text-align: center;
}

/* HEADER GRADIENT */
.cover {
    height: 100px;
    background: linear-gradient(135deg, #6366f1, #06b6d4);
}

/* PROFILE */
.profile {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    margin-top: -55px;
    border: 4px solid rgba(255,255,255,0.2);
    object-fit: cover;
}

/* TEXT */
h1 {
    margin: 10px 0 4px;
    font-size: 22px;
}

p {
    color: #a1a1aa;
    margin-bottom: 16px;
    font-size: 13px;
}

/* SOCIAL ICONS MODERN */
.socials {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 15px;
}

.icon {
    width: 42px;
    height: 42px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    font-size: 18px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1);
    transition: 0.3s;
}

.icon:hover {
    transform: translateY(-3px);
    background: rgba(255,255,255,0.15);
}

/* BUTTONS MODERN */
.btn {
    margin: 10px 18px;
    padding: 13px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    text-decoration: none;
    color: white;
    font-weight: 600;
    transition: 0.25s;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(10px);
}

.btn:hover {
    transform: scale(1.03);
    background: rgba(255,255,255,0.12);
}

/* BUTTON COLORS */
.whatsapp { box-shadow: 0 0 0 1px #22c55e33 inset; }
.call { box-shadow: 0 0 0 1px #f59e0b33 inset; }
.email { box-shadow: 0 0 0 1px #3b82f633 inset; }
.save { box-shadow: 0 0 0 1px #a855f733 inset; }

</style>

</head>

<body>

<div class="card">

    <div class="cover"></div>

    <img class="profile" src="https://i.imgur.com/gBpfXPZ.jpeg">

    <h1>Ahmad Shkri</h1>
    <p>Bank Teller | Digital Banking Specialist</p>

    <!-- ICONS -->
    <div class="socials">
        <a class="icon" href="https://wa.me/000000000">🟢</a>
        <a class="icon" href="https://instagram.com/">📸</a>
        <a class="icon" href="https://linkedin.com/">💼</a>
        <a class="icon" href="mailto:test@email.com">✉️</a>
    </div>

    <!-- BUTTONS -->
    <a class="btn whatsapp" href="https://wa.me/000000000">💬 WhatsApp</a>
    <a class="btn call" href="tel:000000000">📞 Call</a>
    <a class="btn email" href="mailto:test@email.com">📧 Email</a>
    <a class="btn save" href="contact.vcf" download>💾 Save Contact</a>

</div>

</body>
</html>
