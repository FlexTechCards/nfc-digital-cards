<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Business Card</title>

<style>

body{
    margin:0;
    font-family: system-ui, -apple-system, Segoe UI, Roboto;
    background: radial-gradient(circle at top, #0b1220, #020617);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    color:white;
}

/* APP FRAME */
.app{
    width:360px;
    border-radius:28px;
    overflow:hidden;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(22px);
    border:1px solid rgba(255,255,255,0.08);
    box-shadow:0 30px 100px rgba(0,0,0,0.75);
    animation: fadeIn 0.6s ease;
}

/* HEADER */
.header{
    height:130px;
    background: linear-gradient(135deg, #6366f1, #06b6d4);
    position:relative;
}

/* PROFILE */
.profile{
    width:110px;
    height:110px;
    border-radius:50%;
    border:4px solid rgba(255,255,255,0.25);
    object-fit:cover;
    position:absolute;
    bottom:-55px;
    left:50%;
    transform:translateX(-50%);
}

/* CONTENT */
.content{
    padding:65px 18px 20px;
    text-align:center;
}

h1{
    margin:10px 0 5px;
    font-size:22px;
}

p{
    margin:0;
    font-size:13px;
    color:#a1a1aa;
}

/* INFO BOX */
.info{
    margin-top:15px;
    padding:12px;
    border-radius:16px;
    background: rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
    font-size:13px;
    color:#cbd5e1;
}

/* QUICK ICONS */
.icons{
    display:flex;
    justify-content:center;
    gap:12px;
    margin:18px 0;
}

.icon{
    width:46px;
    height:46px;
    border-radius:16px;
    display:flex;
    justify-content:center;
    align-items:center;
    text-decoration:none;
    font-size:18px;
    background: rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.1);
    transition:0.25s;
}

.icon:hover{
    transform:translateY(-4px);
    background: rgba(255,255,255,0.15);
}

/* BUTTONS */
.btn{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    margin:10px 0;
    padding:14px;
    border-radius:16px;
    text-decoration:none;
    color:white;
    font-weight:600;
    background: rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.1);
    transition:0.25s;
}

.btn:hover{
    transform:scale(1.03);
    background: rgba(255,255,255,0.12);
}

/* COLORS */
.whatsapp{ box-shadow:0 0 0 1px #22c55e33 inset; }
.call{ box-shadow:0 0 0 1px #f59e0b33 inset; }
.email{ box-shadow:0 0 0 1px #3b82f633 inset; }
.save{ box-shadow:0 0 0 1px #a855f733 inset; }

/* ANIMATION */
@keyframes fadeIn{
    from{opacity:0; transform:translateY(15px);}
    to{opacity:1; transform:translateY(0);}
}

</style>

</head>

<body>

<div class="app">

    <div class="header">
        <img class="profile" src="https://i.imgur.com/gBpfXPZ.jpeg">
    </div>

    <div class="content">

        <h1>Ahmad Shkri</h1>
        <p>Bank Teller | Digital Banking Specialist</p>

        <div class="info">
            📍 Available for business contact anytime<br>
            ⚡ Digital NFC Business Card
        </div>

        <!-- QUICK ICONS -->
        <div class="icons">
            <a class="icon" href="https://wa.me/000000000">💬</a>
            <a class="icon" href="tel:000000000">📞</a>
            <a class="icon" href="mailto:test@email.com">✉️</a>
        </div>

        <!-- BUTTONS -->
        <a class="btn whatsapp" href="https://wa.me/000000000">WhatsApp</a>
        <a class="btn call" href="tel:000000000">Call Now</a>
        <a class="btn email" href="mailto:test@email.com">Send Email</a>
        <a class="btn save" href="contact.vcf" download>Save Contact</a>

    </div>

</div>

</body>
</html>
