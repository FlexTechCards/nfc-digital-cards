<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ahmad Shkri</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #0f172a, #111827);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.card {
    background: #1f2937;
    padding: 30px;
    border-radius: 25px;
    width: 340px;
    text-align: center;
    box-shadow: 0 15px 40px rgba(0,0,0,0.6);
}

img {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    object-fit: cover;
    margin-bottom: 15px;
    border: 3px solid #3b82f6;
}

h1 {
    margin: 10px 0;
    font-size: 22px;
}

p {
    color: #cbd5e1;
    margin-bottom: 20px;
}

.btn {
    display: block;
    margin: 10px 0;
    padding: 12px;
    border-radius: 12px;
    text-decoration: none;
    color: white;
    font-weight: bold;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
}

.whatsapp { background: #22c55e; }
.call { background: #f59e0b; }
.email { background: #3b82f6; }
</style>

</head>

<body>

<div class="card">

    <img src="https://via.placeholder.com/110" alt="profile">

    <h1>Ahmad Shkri</h1>
    <p>Banking Professional | Digital Services</p>

    <a class="btn whatsapp" href="https://wa.me/000000000">💬 WhatsApp</a>
    <a class="btn call" href="tel:000000000">📞 Call</a>
    <a class="btn email" href="mailto:test@email.com">📧 Email</a>

</div>

</body>
</html>
