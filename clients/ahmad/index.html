<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Business Card</title>

<style>

body{
    margin:0;
    font-family: system-ui, -apple-system, Segoe UI, Roboto;
    background: radial-gradient(circle at top, #0b1220, #020617);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    color:white;
}

/* CARD */
.app{
    width:360px;
    border-radius:28px;
    overflow:hidden;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(22px);
    border:1px solid rgba(255,255,255,0.08);
    box-shadow:0 30px 100px rgba(0,0,0,0.75);
}

/* HEADER */
.header{
    height:120px;
    background: linear-gradient(135deg, #6366f1, #06b6d4);
    position:relative;
}

/* PROFILE */
.profile{
    width:110px;
    height:110px;
    border-radius:50%;
    border:4px solid rgba(255,255,255,0.25);
    object-fit:cover;
    position:absolute;
    bottom:-55px;
    left:50%;
    transform:translateX(-50%);
}

/* CONTENT */
.content{
    padding:65px 18px 20px;
    text-align:center;
}

h1{
    margin:10px 0 5px;
    font-size:22px;
}

p{
    margin:0;
    font-size:13px;
    color:#a1a1aa;
}

/* ACTION GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    margin:18px 0;
}

.icon-btn{
    background: rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:16px;
    padding:12px;
    text-align:center;
    cursor:pointer;
    transition:0.25s;
    font-size:18px;
}

.icon-btn:hover{
    transform:translateY(-4px);
    background: rgba(255,255,255,0.15);
}

/* BUTTONS */
.btn{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    margin:10px 0;
    padding:14px;
    border-radius:16px;
    text-decoration:none;
    color:white;
    font-weight:600;
    background: rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.1);
    transition:0.25s;
}

.btn:hover{
    transform:scale(1.03);
    background: rgba(255,255,255,0.12);
}

/* QR */
.qr{
    margin-top:10px;
    border-radius:12px;
}

/* MAP */
.map{
    width:100%;
    height:140px;
    border-radius:14px;
    border:none;
    margin-top:10px;
}

</style>

</head>

<body>

<div class="app">

    <div class="header">
        <img class="profile" src="https://i.imgur.com/gBpfXPZ.jpeg">
    </div>

    <div class="content">

        <h1>Ahmad Shkri</h1>
        <p>Bank Teller | Digital Banking Specialist</p>

        <!-- QUICK ACTIONS -->
        <div class="grid">

            <div class="icon-btn" onclick="copyNumber()">📋</div>
            <div class="icon-btn" onclick="shareCard()">📤</div>
            <a class="icon-btn" href="tel:000000000">📞</a>

        </div>

        <!-- BUTTONS -->
        <a class="btn" href="https://wa.me/000000000">💬 WhatsApp</a>
        <a class="btn" href="mailto:test@email.com">✉️ Email</a>
        <a class="btn" href="contact.vcf" download>💾 Save Contact</a>
        <a class="btn" href="https://maps.google.com/?q=New York">📍 Open Map</a>

        <!-- QR -->
        <img class="qr"
        src="https://api.qrserver.com/v1/create-qr-code/?size=140x140&data=https://flextechcards.github.io"
        >

    </div>

</div>

<script>

// COPY NUMBER
function copyNumber(){
    navigator.clipboard.writeText("000000000");
    alert("Number copied!");
}

// SHARE CARD
function shareCard(){
    if(navigator.share){
        navigator.share({
            title: "My Digital Card",
            text: "Check my business card",
            url: window.location.href
        });
    } else {
        alert("Sharing not supported");
    }
}

</script>

</body>
</html>
