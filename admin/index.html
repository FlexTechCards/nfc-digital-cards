<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FlexTech Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    font-family: Arial;
    background: radial-gradient(circle at top, #1e293b, #0f172a);
    color:white;
    margin:0;
    padding:20px;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.container{
    max-width:600px;
    margin:auto;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:10px;
    border:none;
}

button{
    background:#3b82f6;
    border:none;
    padding:10px;
    border-radius:10px;
    color:white;
    cursor:pointer;
    width:100%;
    font-weight:bold;
}

.card{
    background: rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    padding:15px;
    border-radius:15px;
    margin-top:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
}

small{
    color:#94a3b8;
    font-size:11px;
    word-break: break-all;
}

.actions{
    display:flex;
    gap:8px;
    flex-direction:column;
}

.btn{
    padding:6px 10px;
    border-radius:8px;
    border:none;
    cursor:pointer;
    font-size:12px;
}

.copy{background:#22c55e;}
.qr{background:#a855f7;}
</style>

</head>

<body>

<h1>📊 FlexTech NFC Dashboard</h1>

<div class="container">

<input id="name" placeholder="Client name (e.g. feras)">

<button onclick="generate()">Generate Client Link</button>

<div id="result"></div>

</div>

<script>
function generate(){
    let name = document.getElementById("name").value.trim().toLowerCase();

    if(!name){
        alert("Enter client name");
        return;
    }

    let link = `https://flextechcards.github.io/nfc-digital-cards/clients/${name}/`;

    document.getElementById("result").innerHTML = `
        <div class="card">
            <div>
                <b>${name}</b><br>
                <small>${link}</small>
            </div>

            <div class="actions">
                <button class="btn copy" onclick="navigator.clipboard.writeText('${link}')">Copy</button>
                <button class="btn qr" onclick="openQR('${link}')">QR</button>
            </div>
        </div>
    `;
}

function openQR(link){
    let qr = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(link)}`;
    window.open(qr, "_blank");
}
</script>

</body>
</html>
