<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Auto Clients Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    font-family: Arial;
    background:#0f172a;
    color:white;
    margin:0;
    padding:20px;
}

h1{
    text-align:center;
}

.container{
    max-width:500px;
    margin:auto;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:8px;
    border:none;
}

button{
    background:#3b82f6;
    border:none;
    padding:10px;
    border-radius:8px;
    color:white;
    cursor:pointer;
    width:100%;
}

.card{
    background:#1e293b;
    padding:15px;
    border-radius:10px;
    margin-top:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

small{
    color:#94a3b8;
}
</style>

</head>

<body>

<h1>📊 Auto Client Link Generator</h1>

<div class="container">

<input id="name" placeholder="Enter client name (e.g. feras)">

<button onclick="generate()">Generate Link</button>

<div id="result"></div>

</div>

<script>
function generate(){
    let name = document.getElementById("name").value.trim().toLowerCase();

    if(!name){
        alert("Enter client name");
        return;
    }

    let link = `https://flextechcards.github.io/nfc-digital-cards/clients/${name}/`;

    document.getElementById("result").innerHTML = `
        <div class="card">
            <div>
                <b>${name}</b><br>
                <small>${link}</small>
            </div>
            <button onclick="navigator.clipboard.writeText('${link}')">Copy</button>
        </div>
    `;
}
</script>

</body>
</html>
